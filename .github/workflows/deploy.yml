name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest

    services:
      # Optional: if you need a real DB, but we run Pest tests with sqlite :memory:
      # so sqlite is perfectly fine.

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, dom, fileinfo, sqlite, pdo_sqlite, bcmath, pgsql, pdo_pgsql
          coverage: none

      - name: Copy .env
        run: php -r "file_exists('.env') || copy('.env.example', '.env');"

      - name: Install Composer Dependencies
        run: composer install --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

      - name: Generate Application Key
        run: php artisan key:generate

      - name: Run Tests
        run: vendor/bin/pest
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: ":memory:"

      # Deploy step example (Railway or Render deploy hook)
      # You can trigger deploy via Railway CLI or Render webhook.
      # For Railway, use:
      # - name: Install Railway CLI
      #   run: npm install -g @railway/cli
      # - name: Deploy to Railway
      #   run: railway up --detach
      #   env:
      #     RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      #
      # For Render:
      # - name: Trigger Render Deploy Hook
      #   run: curl -f "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
      #
      # Below we provide a standard generic step for Railway/Render deploy:
      - name: Deploy to Production
        if: github.ref == 'refs/heads/main'
        run: |
          echo "Deploying to production target..."
          # Example using Railway CLI if RAILWAY_TOKEN is available:
          # if [ -n "${{ secrets.RAILWAY_TOKEN }}" ]; then
          #   npm install -g @railway/cli
          #   railway up --detach
          # fi
          # Example using Render Deploy Hook if available:
          # if [ -n "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" ]; then
          #   curl -f "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
          # fi
