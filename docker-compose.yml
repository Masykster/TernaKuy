version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: ternakuy-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: ternakuy-app
    container_name: ternakuy-app
    ports:
      - "8000:80"
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - REDIS_HOST=redis
    depends_on:
      - redis

volumes:
  redis-data:
